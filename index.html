<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜遊びレオン</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dark:    #0f0820;
  --orange:  #d94f1e;
  --purple:  #3d1f6e;
  --cream:   #f5ead0;
  --yellow:  #f7c948;
  --red:     #c0392b;
  --text:    #f5ead0;
  --sub:     rgba(245,234,208,0.55);
}

html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 90% 55% at 50% 100%, rgba(61,31,110,0.7)  0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 5%  15%,  rgba(217,79,30,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 95% 10%,  rgba(61,31,110,0.35) 0%, transparent 55%),
    var(--dark);
}

.halftone {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image: radial-gradient(circle, rgba(245,234,208,0.065) 1px, transparent 1px);
  background-size: 18px 18px;
}

.rays {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
}
.rays::before {
  content: '';
  position: absolute;
  top: -20%; left: 50%;
  width: 200%; height: 200%;
  transform: translateX(-50%);
  background: repeating-conic-gradient(
    from 0deg,
    rgba(247,201,72,0.03) 0deg 10deg,
    transparent 10deg 20deg
  );
  animation: slowSpin 60s linear infinite;
}
@keyframes slowSpin { to { transform: translateX(-50%) rotate(360deg); } }

.wrap {
  position: relative; z-index: 2;
  max-width: 460px; margin: 0 auto;
  padding: 52px 20px 90px;
  display: flex; flex-direction: column; align-items: center;
}

/* HEADER */
.header {
  width: 100%; text-align: center;
  margin-bottom: 36px;
  animation: popIn .6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.85) translateY(-10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.avatar-wrap {
  position: relative; display: inline-block;
  margin-bottom: 20px;
}

.avatar-border {
  position: absolute; inset: -5px;
  border-radius: 50%;
  background: var(--cream);
  box-shadow: 4px 4px 0 var(--dark), 6px 6px 0 var(--yellow);
}

.star {
  position: absolute;
  font-size: 18px;
  animation: starPop 2s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 4px var(--yellow));
  line-height: 1; z-index: 3;
}
.star-1 { top: -18px; left: -22px; animation-delay: 0s;    font-size: 24px; }
.star-2 { top: -14px; right: -24px; animation-delay: .4s;  font-size: 18px; }
.star-3 { bottom: -10px; left: -18px; animation-delay: .8s; font-size: 16px; }
.star-4 { bottom: -6px; right: -20px; animation-delay: .2s; font-size: 20px; }

@keyframes starPop {
  from { transform: scale(1) rotate(-10deg); }
  to   { transform: scale(1.25) rotate(10deg); }
}

.avatar-img {
  position: relative; z-index: 1;
  width: 150px; height: 150px;
  border-radius: 50%;
  object-fit: cover; object-position: top center;
  display: block;
  border: 3px solid var(--dark);
}

.name {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(30px, 9vw, 44px);
  letter-spacing: .04em; line-height: 1;
  color: var(--cream);
  text-shadow: 3px 3px 0 var(--orange), 5px 5px 0 rgba(0,0,0,.5);
  margin-bottom: 10px;
}
.name span {
  color: var(--yellow);
  text-shadow: 3px 3px 0 var(--red), 5px 5px 0 rgba(0,0,0,.5);
}

.tagline {
  display: inline-block;
  background: var(--yellow);
  color: var(--dark);
  font-family: 'Black Han Sans', sans-serif;
  font-size: 11px;
  letter-spacing: .18em;
  padding: 4px 14px 3px;
  border-radius: 3px;
  border: 2px solid var(--dark);
  box-shadow: 2px 2px 0 var(--dark);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.bio {
  font-size: 12.5px; color: var(--sub);
  line-height: 1.8; font-weight: 300;
  max-width: 340px; margin: 0 auto;
}

/* LINKS */
.links { width: 100%; display: flex; flex-direction: column; gap: 10px; }

.link {
  position: relative;
  display: flex; align-items: center; gap: 13px;
  padding: 0 16px; height: 66px;
  border-radius: 6px;
  background: rgba(245,234,208,0.05);
  border: 2px solid rgba(245,234,208,0.14);
  text-decoration: none; color: var(--text);
  overflow: hidden;
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  opacity: 0; transform: translateX(-20px);
  animation: slideIn .4s ease forwards;
}
.link:nth-child(1){ animation-delay:.10s; }
.link:nth-child(2){ animation-delay:.17s; }
.link:nth-child(3){ animation-delay:.24s; }
.link:nth-child(4){ animation-delay:.31s; }
.link:nth-child(5){ animation-delay:.38s; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

.link:hover {
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--accent), 6px 6px 0 rgba(0,0,0,.5);
  border-color: var(--accent);
  background: rgba(245,234,208,0.09);
}

.link::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 8px 8px;
  opacity: 0; transition: opacity .2s;
}
.link:hover::before { opacity: 1; }

.link::after {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--accent);
}

.lk-line   { --accent: #9b59b6; }
.lk-market { --accent: var(--yellow); }
.lk-x      { --accent: var(--cream); }
.lk-note   { --accent: var(--orange); }
.lk-myfans  { --accent: #e74c6c; --ar:231; --ag:76;  --ab:108; }
.lk-discord { --accent: #5865F2; --ar:88;  --ag:101; --ab:242; }

.icon-box {
  width: 42px; height: 42px;
  border-radius: 8px;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  overflow: hidden;
  transition: background .15s, border-color .15s;
  box-shadow: 2px 2px 0 rgba(0,0,0,.3);
}
.link:hover .icon-box {
  background: rgba(255,255,255,.13);
  border-color: var(--accent);
}

.link-text { flex: 1; min-width: 0; }
.link-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 15px; letter-spacing: .05em;
  color: var(--cream); margin-bottom: 2px;
  text-shadow: 1px 1px 0 rgba(0,0,0,.5);
}
.link-sub {
  font-size: 11px; color: var(--sub);
  font-weight: 300; letter-spacing: .03em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.arrow {
  font-size: 22px; font-weight: 900;
  color: rgba(245,234,208,.2); flex-shrink: 0;
  transition: color .15s, transform .15s;
  font-family: 'Black Han Sans', sans-serif;
}
.link:hover .arrow { color: var(--accent); transform: translateX(4px); }

/* FOOTER */
.footer {
  margin-top: 44px; text-align: center;
  opacity: 0; animation: popIn .5s .55s ease both;
}
.footer-badge {
  display: inline-block;
  border: 2px solid rgba(245,234,208,.14);
  border-radius: 4px;
  padding: 5px 16px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 10px; letter-spacing: .2em;
  color: rgba(245,234,208,.25);
  box-shadow: 2px 2px 0 rgba(0,0,0,.2);
}
</style>
</head>
